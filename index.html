<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Economía</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --correct: #dcfce7;
            --incorrect: #fee2e2;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; justify-content: center; padding: 20px; margin: 0;
        }

        .container { 
            background: var(--card); padding: 30px; border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 650px; 
        }

        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        
        #topic-title { 
            display: block; font-weight: 800; color: var(--primary); 
            text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;
        }

        .meta { color: #64748b; font-size: 0.85rem; margin-top: 5px; }

        h2 { font-size: 1.25rem; line-height: 1.4; margin: 20px 0; }

        .option { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; 
            text-align: left; font-size: 1rem; background: white; transition: 0.2s;
        }

        .option:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
        
        .correct { background: var(--correct) !important; border-color: #22c55e !important; color: #14532d; }
        .incorrect { background: var(--incorrect) !important; border-color: #ef4444 !important; color: #7f1d1d; }

        .explanation { 
            margin-top: 20px; padding: 15px; background: #f1f5f9; 
            border-left: 4px solid var(--primary); border-radius: 4px;
        }

        .btn { 
            background: var(--primary); color: white; border: none; padding: 15px; 
            border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz">
        <div class="header">
            <span id="topic-title">MODULO | TEMA</span>
            <div id="progress" class="meta">Pregunta 1 de 40</div>
        </div>

        <h2 id="question">Cargando...</h2>
        <div id="options"></div>

        <div id="feedback" class="explanation hidden">
            <b style="color:var(--primary)">IDEA CLAVE:</b>
            <p id="desc" style="margin: 5px 0 0 0"></p>
        </div>

        <button id="next" class="btn hidden">Siguiente Pregunta</button>
    </div>

    <div id="result" class="hidden" style="text-align:center">
        <h2>Examen Finalizado</h2>
        <div id="score" style="font-size: 2rem; font-weight: bold; margin: 20px 0; color: var(--primary)"></div>
        <button onclick="location.reload()" class="btn">Repetir Examen</button>
    </div>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
