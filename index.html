<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Economía</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --correct: #dcfce7;
            --correct-border: #22c55e;
            --incorrect: #fee2e2;
            --incorrect-border: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 90%; 
            max-width: 650px; 
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        #module-tag {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
        }

        h2 { 
            font-size: 1.4rem; 
            line-height: 1.4;
            margin-bottom: 25px;
            color: #0f172a;
        }

        .option-button { 
            display: block; 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem;
            transition: all 0.2s ease;
            background: #fff;
            color: #475569;
        }

        .option-button:hover:not(:disabled) { 
            border-color: var(--primary);
            background-color: #f8fafc;
            transform: translateY(-2px);
        }

        .correct { 
            background-color: var(--correct) !important; 
            border-color: var(--correct-border) !important; 
            color: #14532d !important;
            font-weight: 600;
        }

        .incorrect { 
            background-color: var(--incorrect) !important; 
            border-color: var(--incorrect-border) !important; 
            color: #7f1d1d !important;
        }

        .explanation-container { 
            margin-top: 25px; 
            padding: 20px; 
            background-color: #f8fafc; 
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .hidden { display: none; }

        .next-button { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-top: 25px; 
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: opacity 0.2s;
        }

        .next-button:hover { opacity: 0.9; }

        .progress {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="question-container">
        <div class="header">
            <span id="module-tag"></span>
            <span class="progress" id="progress-text"></span>
        </div>
        <h2 id="question"></h2>
        <div id="options-container"></div>
        
        <div id="explanation-container" class="explanation-container hidden">
            <strong style="color: var(--primary); display: block; margin-bottom: 5px;">Idea Clave:</strong>
            <p id="explanation-text" style="margin: 0;"></p>
        </div>
        
        <button id="next-button" class="next-button hidden">Siguiente Pregunta</button>
    </div>

    <div id="results-container" class="hidden" style="text-align: center;">
        <h2 style="font-size: 2rem;">¡Test Finalizado!</h2>
        <div id="score-text" style="font-size: 1.2rem; margin-bottom: 30px;"></div>
        <button id="restart-button" class="next-button">Reiniciar Simulador</button>
    </div>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
