<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Preparación - Módulos 11 y 12</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .hidden { display: none; }
        .option-button { display: block; width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; text-align: left; }
        .option-button:hover { background-color: #f0f0f0; }
        .correct { background-color: #d4edda !important; border-color: #c3e6cb; }
        .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb; }
        .explanation-container { margin-top: 20px; padding: 15px; background-color: #e7f3ff; border-left: 5px solid #2196f3; }
        .next-button { background-color: #2196f3; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Test de Preparación - Economía</h1>
    
    <div id="question-container" class="question-container">
        <h2 id="question"></h2>
        <div id="options-container" class="options-container"></div>
        
        <div id="explanation-container" class="explanation-container hidden">
            <p id="explanation-text"></p>
        </div>
        
        <button id="next-button" class="next-button hidden">Siguiente Pregunta</button>
    </div>

    <div id="results-container" class="results-container hidden">
        <h2>Resultados del Test</h2>
        <div id="score-text"></div>
        <button id="restart-button" class="next-button">Volver a Empezar</button>
    </div>
</div>

<!-- IMPORTANTE: Los scripts deben ir en este orden -->
<script src="questions.js"></script>
<script src="app.js"></script>

</body>
</html>
