<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Economía - Módulos 11 y 12</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --correct: #dcfce7;
            --correct-text: #166534;
            --incorrect: #fee2e2;
            --incorrect-text: #991b1b;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            display: flex; 
            justify-content: center; 
            padding: 40px 20px;
            margin: 0;
        }

        .container { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 700px; 
        }

        h1 { 
            font-size: 1.5rem; 
            color: #64748b; 
            margin-bottom: 30px; 
            text-align: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        /* Estilo para el Tag del Módulo */
        #module-tag {
            display: inline-block;
            background: #e2e8f0;
            color: #475569;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        h2 { 
            font-size: 1.25rem; 
            line-height: 1.5;
            margin-bottom: 25px;
            color: var(--text);
        }

        .option-button { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border: 2px solid #f1f5f9; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 1rem;
            transition: all 0.2s ease;
            background: #fff;
        }

        .option-button:hover:not(:disabled) { 
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        .correct { 
            background-color: var(--correct) !important; 
            border-color: #86efac !important; 
            color: var(--correct-text);
            font-weight: 600;
        }

        .incorrect { 
            background-color: var(--incorrect) !important; 
            border-color: #fca5a5 !important; 
            color: var(--incorrect-text);
        }

        .explanation-container { 
            margin-top: 25px; 
            padding: 20px; 
            background-color: #f0f9ff; 
            border-left: 6px solid var(--primary); 
            border-radius: 8px;
            line-height: 1.6;
        }

        .hidden { display: none; }

        .next-button { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 14px 28px; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
        }

        .next-button:hover { background-color: #1d4ed8; }

        #score-text ul { padding: 0; list-style: none; }
        #score-text li { margin: 10px 0; padding: 10px; background: #f8fafc; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Simulador de Examen</h1>
    
    <div id="question-container">
        <span id="module-tag"></span>
        <h2 id="question"></h2>
        <div id="options-container"></div>
        
        <div id="explanation-container" class="explanation-container hidden">
            <strong>Idea Clave:</strong>
            <p id="explanation-text"></p>
        </div>
        
        <button id="next-button" class="next-button hidden">Siguiente Pregunta</button>
    </div>

    <div id="results-container" class="results-container hidden">
        <h2>Resultados Finales</h2>
        <div id="score-text"></div>
        <button id="restart-button" class="next-button">Intentar de nuevo</button>
    </div>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>

</body>
</html>
